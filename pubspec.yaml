name: masraf_bol
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  drift: ^2.33.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  printing: ^5.14.3
  riverpod_annotation: ^4.0.3
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
